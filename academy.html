<!DOCTYPE html>
<html>
<head>
<title>SkillGap AI Learning Academy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#141e30,#243b55,#00c6ff);
color:white;
font-family:'Segoe UI';
min-height:100vh;
}

.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px;
margin-top:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.card{
background:rgba(255,255,255,0.2);
border:none;
border-radius:15px;
}

.progress{
height:20px;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="glass">

<h2 class="text-center">SkillGap AI Learning Academy</h2>
<p class="text-center">Courses based on your missing skills</p>

<div id="courses" class="row g-3 mt-3"></div>

<hr class="mt-5">

<h4 class="text-center">Placement Probability</h4>
<p id="placement" class="text-center fw-bold"></p>

<div class="text-center mt-4">
<a href="index.html" class="btn btn-light">Back to Dashboard</a>
</div>

</div>
</div>

<script>

/* COURSE DATABASE */

const academyCourses={
"java":{course:"Java Backend Mastery",duration:"6 Weeks"},
"spring boot":{course:"Spring Boot REST APIs",duration:"5 Weeks"},
"python":{course:"Python for Developers",duration:"4 Weeks"},
"sql":{course:"SQL Database Design",duration:"3 Weeks"},
"git":{course:"Git & GitHub",duration:"2 Weeks"},
"docker":{course:"Docker Basics",duration:"2 Weeks"},
"html":{course:"HTML & CSS Complete",duration:"3 Weeks"},
"react":{course:"React Development",duration:"5 Weeks"},
"machine learning":{course:"Machine Learning Foundations",duration:"6 Weeks"}
};

let missing=JSON.parse(localStorage.getItem("missingSkills")||"[]");

let div=document.getElementById("courses");

/* NO MISSING SKILLS */

if(missing.length==0){
div.innerHTML="<h4 class='text-center'>No missing skills 🎉</h4>";
document.getElementById("placement").innerText="Placement Probability: 90%";
}

/* SHOW COURSES */

else{

missing.forEach(skill=>{

let c=academyCourses[skill] || {course:"General Skill Course",duration:"3 Weeks"};

div.innerHTML+=`
<div class="col-md-4">
<div class="card p-3">

<h5>${c.course}</h5>
<p><b>Skill:</b> ${skill}</p>
<p><b>Duration:</b> ${c.duration}</p>

<button class="btn btn-warning w-100 mb-2" onclick="enroll('${skill}')">
Enroll Now
</button>

<div id="progress-${skill}" class="hidden mt-2">
<input type="range" min="0" max="100" value="0"
onchange="updateProgress('${skill}', this.value)">
<div class="progress mt-1">
<div id="bar-${skill}" class="progress-bar bg-success">0%</div>
</div>

<button class="btn btn-light w-100 mt-2"
onclick="downloadCertificate('${skill}')">
Download Certificate
</button>

</div>

</div>
</div>`;
});

document.getElementById("placement").innerText=
"Placement Probability: "+placementScore()+"%";

}

/* ENROLL */

function enroll(skill){
alert("Enrolled in "+skill+" course!");
document.getElementById("progress-"+skill).style.display="block";
}

/* PROGRESS */

function updateProgress(skill,val){
let bar=document.getElementById("bar-"+skill);
bar.style.width=val+"%";
bar.innerText=val+"%";
}

/* CERTIFICATE */

function downloadCertificate(skill){

let text="Certificate of Completion\n\nThis certifies that you completed "+skill+" course.";

let blob=new Blob([text],{type:"text/plain"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download=skill+"_certificate.txt";
link.click();
}

/* PLACEMENT PREDICTION */

function placementScore(){

let total=missing.length;

if(total<=2) return 85;
if(total<=5) return 65;
return 0;

}

</script>

</body>
</html>
