<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Skill Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>

<style>
body{
background: linear-gradient(135deg,#141e30,#243b55,#00c6ff);
min-height:100vh;
font-family:'Segoe UI';
color:white;
}
.glass{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px;
width:50%;
margin:auto;
margin-top:80px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.hidden{display:none;}
.progress{height:25px;font-weight:bold;}

</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="glass">
<h3>Login</h3>
<input id="loginUser" class="form-control" placeholder="Email">
<input id="loginPass" type="password" class="form-control mt-2" placeholder="Password">
<button class="btn btn-primary w-100 mt-2" onclick="login()">Login</button>
<p class="mt-2">New? <a href="#" onclick="showSignup()" style="color:coral">Signup</a></p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="glass hidden">
<h3>Signup</h3>
<input id="newUser" class="form-control" placeholder="Email">
<input id="newPass" type="password" class="form-control mt-2" placeholder="Password">
<button class="btn btn-primary w-100 mt-2" onclick="signup()">Signup</button>
<p class="mt-2"><a href="#" onclick="showLogin()" style="color:coral">Back to Login</a></p>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="glass hidden">

<div class="d-flex justify-content-between">
<h3>AI Resume Skill Analyzer</h3>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

<label class="mt-3">Upload Resume (PDF or TXT)</label>
<input type="file" id="resumeFile" class="form-control">

<label class="mt-3">Paste Job Description</label>
<textarea id="jobDesc" class="form-control" rows="5"
placeholder="Example: Backend developer with Java, Spring Boot, SQL, REST API"></textarea>

<button class="btn btn-light w-100 mt-3" onclick="analyze()">Analyze</button>

<div id="result" class="hidden mt-4">
<h5>Skill Match Score</h5>
<div class="progress mb-3">
<div id="scoreBar" class="progress-bar bg-success">0%</div>
</div>

<h5>Required Skills</h5>
<ul id="requiredSkills"></ul>

<h5>Missing Skills</h5>
<ul id="missingSkills"></ul>

<h5>Improvement Suggestions</h5>
<ul id="suggestions"></ul>
</div>

</div>
</div>

<script>

/* GET DOM ELEMENTS SAFELY */
const loginPage=document.getElementById("loginPage");
const signupPage=document.getElementById("signupPage");
const dashboardPage=document.getElementById("dashboardPage");
const result=document.getElementById("result");
const scoreBar=document.getElementById("scoreBar");
const requiredSkills=document.getElementById("requiredSkills");
const missingSkills=document.getElementById("missingSkills");
const suggestions=document.getElementById("suggestions");
const jobDesc=document.getElementById("jobDesc");
const resumeFile=document.getElementById("resumeFile");

/* LOGIN SYSTEM */

function showSignup(){
loginPage.classList.add("hidden");
signupPage.classList.remove("hidden");
}

function showLogin(){
signupPage.classList.add("hidden");
loginPage.classList.remove("hidden");
}

function signup(){
if(!newUser.value || !newPass.value){
alert("Enter Email & Password");
return;
}
localStorage.setItem(newUser.value,newPass.value);
alert("Signup success!");
showLogin();
}

function login(){
if(localStorage.getItem(loginUser.value)===loginPass.value){
loginPage.classList.add("hidden");
signupPage.classList.add("hidden");
dashboardPage.classList.remove("hidden");
}else alert("Wrong Email or Password");
}

function logout(){
location.reload();
}

/* ROLE BASED SKILLS */

const roleSkills={
backend:["java","spring","spring boot","python","django","node","sql","mysql","mongodb","rest api","git","docker"],
frontend:["html","css","javascript","bootstrap","react","angular","vue","responsive design","figma"],
datascience:["python","machine learning","pandas","numpy","tensorflow","statistics","sql"]
};

function detectRole(text){
text=text.toLowerCase();
if(text.includes("backend")) return "backend";
if(text.includes("frontend")) return "frontend";
if(text.includes("data")) return "datascience";
return "backend";
}

/* ANALYZE */

async function analyze(){

let jobText=jobDesc.value.toLowerCase();
if(jobText===""){alert("Enter job description");return;}

let role=detectRole(jobText);
let required=roleSkills[role];

let resume="";
let file=resumeFile.files[0];

if(file){
let reader=new FileReader();

reader.onload=async function(){

if(file.name.endsWith(".pdf")){
let pdf=await pdfjsLib.getDocument({data:new Uint8Array(this.result)}).promise;
for(let i=1;i<=pdf.numPages;i++){
let page=await pdf.getPage(i);
let txt=await page.getTextContent();
resume+=txt.items.map(x=>x.str).join(" ");
}
process(resume.toLowerCase(),required);

}else process(this.result.toLowerCase(),required);

};

if(file.name.endsWith(".pdf")) reader.readAsArrayBuffer(file);
else reader.readAsText(file);

}else process("",required);
}

/* PROCESS */

function process(resume,required){

let missing=required.filter(skill=>!resume.includes(skill));
let score=Math.floor(((required.length-missing.length)/required.length)*100);

result.classList.remove("hidden");
scoreBar.style.width=score+"%";
scoreBar.innerText=score+"%";

requiredSkills.innerHTML=required.map(x=>`<li>${x}</li>`).join("");

missingSkills.innerHTML=
missing.length?
missing.map(x=>`<li>${x}</li>`).join("")
:"<li>No Missing Skills 🎉</li>";

suggestions.innerHTML=missing.map(skill=>`
<li>
<b>${skill}</b>
<ul>
<li>Take certification course</li>
<li>Build 2 projects</li>
<li>Upload to GitHub</li>
<li>Add to resume</li>
<li>Practice interviews</li>
</ul>
</li>`).join("");

// SAVE FOR ACADEMY PAGE
localStorage.setItem("missingSkills", JSON.stringify(missing));

// ADD BUTTON (no duplication)
suggestions.innerHTML += `
<div class="mt-3">
<button class="btn btn-warning w-100" onclick="goAcademy()">
View Recommended Courses
</button>
</div>`;
}

function goAcademy(){
window.location.href="academy.html";
}

</script>
</body>
</html>
